<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Elokuvan tiedot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Header -->
<div class="p-1 bg-secondary text-white text-center">
  <h1 id="title"> 🎬 </h1>
</div>

    <!-- Navbar -->
<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
  <div class="container-fluid">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="index.html">Etusivu</a></li>
      <li class="nav-item"><a class="nav-link" href="watched.html">Elokuvalista</a></li>
      <li class="nav-item"><a class="nav-link active" href="elokuvahaku.html">Elokuvahaku</a></li>
      <li class="nav-item"><a class="nav-link" href="blog.html">Blogi</a></li>
    </ul>
  </div>
</nav>


    <div class="container mt-5">

        <div class="row">

            <!-- Poster -->
            <div class="col-md-4 text-center">
                <img id="poster" class="img-fluid">
            </div>

            <!-- Tiedot -->
            <div class="col-md-8">
                <h1 id="title"></h1>
                <h4 id="rating" class="mt-3"></h4>
                <p id="plot" class="mt-4"></p>
                <a href="elokuvahaku.html" class="btn btn-secondary mt-3">⬅ Takaisin</a>
            </div>

        </div>

    </div>

    <script>
        const apiKey = "45534897";

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${id}`)
            .then(response => response.json())
            .then(movie => {
                document.getElementById("title").innerText = movie.Title;
                document.getElementById("poster").src = movie.Poster !== "N/A" ? movie.Poster : 'https://via.placeholder.com/300x450?text=No+Image';
                document.getElementById("rating").innerText = "IMDb rating: " + movie.imdbRating;
                document.getElementById("plot").innerText = movie.Plot;
            })
            .catch(err => {
                console.error(err);
                alert("Tietojen haku epäonnistui.");
            });
    </script>
<!-- Footer -->
<div class="mt-5 p-4 bg-dark text-white text-center fixed-bottom">
  <p>© 2026 Elokuva Blogi</p>
</div>
</body>
</html>
