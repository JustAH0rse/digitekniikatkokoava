<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Elokuvahaku</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<!-- Header -->
<div class="p-1 bg-secondary text-white text-center">
  <h1>🎬 Elokuvahaku </h1>
  <p>Tästä voit hakea minkä tahansa elokuvan juoni kuvauksen ja IMDB arvosanan</p>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
  <div class="container-fluid">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="index.html">Etusivu</a></li>
      <li class="nav-item"><a class="nav-link" href="watched.html">Elokuvalista</a></li>
      <li class="nav-item"><a class="nav-link active" href="elokuvahaku.html">Elokuvahaku</a></li>
      <li class="nav-item"><a class="nav-link" href="blog.html">Blogi</a></li>
    </ul>
  </div>
</nav>

<!-- Header -->
<div class="container mt-4">
<h1 class="text-center mb-4">🎬 🎬 🎬</h1>

<!-- Hakukenttä -->
<div class="input-group mb-4">
  <input type="text" id="searchInput" class="form-control" placeholder="Hae elokuvaa" onkeypress="if(event.key==='Enter'){searchMovies();}">
  <button class="btn btn-primary" onclick="searchMovies()">Hae</button>
</div>

<!-- Tulokset -->
<div class="row" id="results"></div>
</div>

<script>
const apiKey = "45534897"; // Oma OMDb API-avain

async function searchMovies(){
  const search = document.getElementById("searchInput").value.trim();
  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!search){
    alert("Kirjoita elokuvan nimi!");
    return;
  }

  try{
    const response = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&s=${encodeURIComponent(search)}`);
    const data = await response.json();

    if(data.Response === "True" && data.Search){
      data.Search.forEach(movie => {
        results.innerHTML += `
        <div class="col-md-3 mb-4">
          <div class="card h-100 bg-light text-dark">
            <img src="${movie.Poster !== "N/A" ? movie.Poster : 'https://via.placeholder.com/150x220?text=No+Image'}" class="card-img-top">
            <div class="card-body text-center">
              <a href="movie.html?id=${movie.imdbID}" class="text-decoration-none text-dark">
                <h5 class="card-title">${movie.Title}</h5>
              </a>
              <p>${movie.Year}</p>
            </div>
          </div>
        </div>
        `;
      });
    } else {
      results.innerHTML = `<p class="text-center">Elokuvia ei löytynyt.</p>`;
    }

  } catch(err){
    console.error(err);
    results.innerHTML = `<p class="text-center">Haku epäonnistui. Tarkista API-avain ja yhteys.</p>`;
  }
}
</script>
<!-- Footer -->
<div class="mt-5 p-4 bg-dark text-white text-center fixed-bottom">
  <p>© 2026 Elokuva Blogi</p>
</div>
</body>
</html>
